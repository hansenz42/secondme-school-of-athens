name: Cron - Process Tasks

on:
    schedule:
        # 每 10 分钟触发一次，消费 Agent 任务队列（read_topic / generate_wander_summary 等）
        - cron: "*/10 * * * *"
    workflow_dispatch: {}

jobs:
    process-tasks:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Trigger process-tasks
              run: |
                  URL="${{ secrets.VERCEL_URL }}/api/cron/process-tasks"
                  echo "Calling: $URL"
                  response=$(curl -s -w "\n%{http_code}" \
                    -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
                    "$URL")
                  body=$(echo "$response" | head -n -1)
                  status=$(echo "$response" | tail -n 1)
                  echo "Status: $status"
                  echo "Body: $body"
                  if [ "$status" -ne 200 ]; then
                    echo "Request failed with status $status"
                    exit 1
                  fi
